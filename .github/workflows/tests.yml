name: Tests

# Runs the test suite against a throwaway Postgres. Independent of
# push-container.yml (which builds/pushes the image) — this only runs tests.

on:
  push:
  pull_request:
  workflow_dispatch:

# Cancel an in-progress run when newer commits land on the same ref.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest

    # GitHub provisions Postgres as a sidecar container (the CI equivalent of the
    # `docker run` in scripts/run_local_tests.sh). The job then talks to it on
    # localhost via the mapped port.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: userapp_test
        ports:
          - 5432:5432
        # Hold the job until Postgres is accepting connections.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Connection info for the service above. Host/port differ from local
      # (which uses 5433); everything else mirrors scripts/test.env.
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: userapp_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      SECRET_KEY: test-secret-ci
      TEST_ADMIN_ID: "4"
      # No .venv in CI — point the shared scripts at the runner's Python.
      PYTHON: python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Reuses the exact migrate + seed + pytest core that `make test` runs
      # locally; only the database provisioning above differs.
      - name: Run migrations, seed, and tests
        run: make test-run
